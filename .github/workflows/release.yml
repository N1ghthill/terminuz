name: Release

on:
  push:
    tags:
      - "terminuz-v*.*.*"
      - "deepcode-ai-v*.*.*"

jobs:
  release:
    name: Test, build and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to create GitHub Release
      id-token: write # needed for npm provenance
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@ac6db6d3c1f721f886538a378a2d73e85697340a # v6
        with:
          version: 9.15.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Scan tracked files for secrets
        run: pnpm secrets:scan

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit

      - name: Audit production dependencies
        run: pnpm audit --prod

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build all packages
        run: pnpm build

      - name: Resolve release package
        id: package
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == terminuz-v* ]]; then
            NAME="terminuz"
            FILTER="terminuz"
            FILE="./apps/terminuz/package.json"
          elif [[ "$TAG" == deepcode-ai-v* ]]; then
            NAME="deepcode-ai"
            FILTER="deepcode-ai"
            FILE="./apps/deepcode-legacy/package.json"
          else
            echo "Unsupported release tag: $TAG" >&2
            exit 1
          fi
          VERSION="$(node -p "require('$FILE').version")"
          EXPECTED_TAG="$NAME-v$VERSION"
          test "$TAG" = "$EXPECTED_TAG" || {
            echo "Tag $TAG does not match $NAME@$VERSION (expected $EXPECTED_TAG)" >&2
            exit 1
          }
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "filter=$FILTER" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check whether package version is already published
        id: npm_version
        continue-on-error: true
        run: npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version

      - name: Publish to NPM
        if: steps.npm_version.outcome == 'failure'
        run: pnpm --filter "${{ steps.package.outputs.filter }}" publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip NPM publish
        if: steps.npm_version.outcome == 'success'
        run: echo "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} is already published; skipping npm publish."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          generate_release_notes: true
          make_latest: true
